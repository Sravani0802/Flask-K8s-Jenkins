apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-cal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-cal
  template:
    metadata:
      labels:
        app: flask-cal
    spec:
      containers:
      - name: flask-cal
        image: 138383657739.dkr.ecr.ap-south-1.amazonaws.com/flask-cal:latest
        ports:
        - containerPort: 5000



